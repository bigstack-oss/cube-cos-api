name: CI workflow

on:
  pull_request:
    branches:
      - "develop"
      - "release_*"

jobs:
  checks:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: true
      - name: Generate API docs
        uses: mikefarah/yq@751d8ad57b84f1794661bc70c0afb92a22ad7b3c # v4.53.2
        with:
          cmd: yq -o=json -I=4 api/cube-cos-openapi/docs.yaml > api/docs.json
      - name: Install Golang
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ">=1.22.2"
      - name: Go vet
        run: go vet ./...
  builds:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: true
      - name: Generate API docs
        uses: mikefarah/yq@751d8ad57b84f1794661bc70c0afb92a22ad7b3c # v4.53.2
        with:
          cmd: yq -o=json -I=4 api/cube-cos-openapi/docs.yaml > api/docs.json
      - name: Install Golang
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ">=1.22.2"
      - name: Go binary
        run: go build cmd/main.go
      - name: Go test
        run: go test ./...
