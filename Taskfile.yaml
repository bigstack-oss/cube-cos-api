version: "3"

includes:
  rpm: ./scripts/rpm.yaml

vars:
  apiService: "cube-cos-api"
  dbService: "cube-cos-mongo"
  dbReplicaSet: "cube-cos-rs"
  devCosUser: "root"
  devCosIp: "<REPLACE_WITH_YOUR_DEV_COS_IP>"
  devE2EIp: "<REPLACE_WITH_YOUR_E2E_COS_IP>"
  devE2EContainer: "3c_3p_5s"
  devE2ENode: "10.1.0.1"
  mongoVersion: "6.0.19"
  jenkinsBuildServerUser: "root"
  jenkinsBuildServerIp: "10.32.200.11"
  jenkinsBuildServerBinaryImage: "localhost:5000/cube-cos-api-jail"
  jenkinsBuildServerRpmImage: "localhost:5000/cube-cos-api-rpm"

tasks:
  check:
    cmds:
      - task: generateApiDocs
      - task: vet
      - task: diffMod
  build:
    cmds:
      - task: buildLocalBinary
  vet:
    cmds:
      - CGO_ENABLED=1 GOWORK=off go vet ./...
  diffMod:
    cmds:
      - CGO_ENABLED=1 GOWORK=off go mod tidy
  generateApiDocs:
    desc: Generate api/docs.json from api/cube-cos-openapi/docs.yaml
    cmds:
      - yq -o=json -I=4 api/cube-cos-openapi/docs.yaml > api/docs.json
  test:
    cmds:
      - CGO_ENABLED=1 GOWORK=off go test -v ./...
  buildLocalBinary:
    deps:
      - generateApiDocs
    cmds:
      - cmd: docker compose run --rm cube-cos-api-builder
        platforms: [darwin, windows]
      - cmd: CGO_ENABLED=1 GOWORK=off GOOS=linux GOARCH=amd64 go build -o bin/{{.apiService}} cmd/main.go
        platforms: [linux]
  runLocalDevApi:
    deps:
      - generateApiDocs
    cmds:
      - CGO_ENABLED=1 GOWORK=off go run cmd/main.go -conf configs/{{.apiService}}.yaml
  runLocalDevMongo:
    cmds:
      - docker run -d -p 27017:27017 --name {{.dbService}}-0 --hostname {{.dbService}}-0 mongo:{{.mongoVersion}} mongod --replSet cube-cos-rs
  deployAllRemoteDevServices:
    cmds:
      - task: deployRemoteDevApi
      - task: deployRemoteDevMongo
  deployRemoteDevApi:
    cmds:
      - task: buildLocalBinary
      - task: initRemoteCosDevEnv
      - task: moveLocalBinaryToRemoteCos
      - task: moveLocalConfigToRemoteCos
      - task: activateSystemdService
  deployRemoteE2EApi:
    cmds:
      - task: buildLocalBinary
      - task: moveLocalBinaryToRemoteE2E
      - task: moveLocalConfigToRemoteE2E
      - task: restartRemoteE2ESystemdService
  deployRemoteDevMongo:
    cmds:
      - task: initRemoteCosDevEnv
      - task: simulateRemoteProductionMongo
  simulateRemoteProductionMongo:
    cmds:
      - ssh {{.devCosUser}}@{{.devCosIp}} "docker run -itd -p 27017:27017 -v /opt/dev/{{.apiService}}/mongo/{{.dbService}}-0:/data/db --name {{.dbService}}-0 --network={{.dbService}} --hostname {{.dbService}}-0 mongo:{{.mongoVersion}} mongod --replSet {{.dbReplicaSet}} --bind_ip_all"
      - ssh {{.devCosUser}}@{{.devCosIp}} "sleep 5"
      - ssh {{.devCosUser}}@{{.devCosIp}} 'docker exec -i {{.dbService}}-0 mongosh --quiet --eval "rs.initiate({\"_id\":\"{{.dbReplicaSet}}\",\"members\":[{\"_id\":0,\"host\":\"localhost:27017\"}]})"'
      - ssh {{.devCosUser}}@{{.devCosIp}} 'docker exec -i {{.dbService}}-0 mongosh --quiet --eval "db.getSiblingDB(\"admin\").createUser({user:\"admin\",pwd:\"admin\",roles:[{role:\"userAdminAnyDatabase\",db:\"admin\"}]})"'
  removeRemoteDevMongo:
    cmds:
      - ssh {{.devCosUser}}@{{.devCosIp}} "docker rm -f {{.dbService}}-0"
      - ssh {{.devCosUser}}@{{.devCosIp}} "rm -rf /opt/dev/{{.apiService}}/mongo"
      - ssh {{.devCosUser}}@{{.devCosIp}} "rm -rf /etc/{{.apiService}}/mongo"
      - ssh {{.devCosUser}}@{{.devCosIp}} "docker network rm {{.dbService}}"
  initRemoteCosDevEnv:
    cmds:
      - task: initRemoteCosWorkspace
      - task: initRemoteCosContainerNetwork
  initRemoteCosWorkspace:
    cmds:
      - ssh {{.devCosUser}}@{{.devCosIp}} "mkdir -p /opt/dev/{{.apiService}}/mongo"
      - ssh {{.devCosUser}}@{{.devCosIp}} "mkdir -p /etc/cube/api"
      - ssh {{.devCosUser}}@{{.devCosIp}} "grep {{.apiService}} /etc/group || groupadd {{.apiService}}"
      - ssh {{.devCosUser}}@{{.devCosIp}} "id {{.apiService}} || useradd -g {{.apiService}} {{.apiService}}"
  initRemoteCosContainerNetwork:
    cmds:
      - ssh {{.devCosUser}}@{{.devCosIp}} "docker network ls | grep {{.dbService}} || docker network create {{.dbService}}"
    ignore_error: true
  moveLocalBinaryToRemoteCos:
    cmds:
      - ssh {{.devCosUser}}@{{.devCosIp}} "rm /usr/local/bin/{{.apiService}}"
      - scp bin/{{.apiService}} {{.devCosUser}}@{{.devCosIp}}:/usr/local/bin/{{.apiService}}
      - ssh {{.devCosUser}}@{{.devCosIp}} "chown -R {{.apiService}}:{{.apiService}} /usr/local/bin/{{.apiService}}"
  moveLocalBinaryToRemoteE2E:
    cmds:
      - ssh {{.devCosUser}}@{{.devE2EIp}} "rm /opt/{{.apiService}}"
      - scp bin/{{.apiService}} {{.devCosUser}}@{{.devE2EIp}}:/opt/{{.apiService}}
      - ssh {{.devCosUser}}@{{.devE2EIp}} "docker cp /opt/{{.apiService}} {{.devE2EContainer}}:/opt/{{.apiService}}"
      - ssh {{.devCosUser}}@{{.devE2EIp}} "docker exec -i {{.devE2EContainer}} ssh root@{{.devE2ENode}} rm /usr/local/bin/{{.apiService}}"
      - ssh {{.devCosUser}}@{{.devE2EIp}} "docker exec -i {{.devE2EContainer}} scp /opt/{{.apiService}} root@{{.devE2ENode}}:/usr/local/bin/{{.apiService}}"
      - ssh {{.devCosUser}}@{{.devE2EIp}} "docker exec -i {{.devE2EContainer}} ssh root@{{.devE2ENode}} chown -R {{.apiService}}:{{.apiService}} /usr/local/bin/{{.apiService}}"
    ignore_error: true
  moveLocalConfigToRemoteCos:
    cmds:
      - scp configs/{{.apiService}}.yaml.template {{.devCosUser}}@{{.devCosIp}}:/etc/cube/api/cube-cos-api.yaml
      - scp init/cube-cos-api.service {{.devCosUser}}@{{.devCosIp}}:/lib/systemd/system
  moveLocalConfigToRemoteE2E:
    cmds:
      - scp configs/{{.apiService}}.yaml.template {{.devCosUser}}@{{.devE2EIp}}:/opt/cube-cos-api.yaml
      - ssh {{.devCosUser}}@{{.devE2EIp}} "docker cp /opt/cube-cos-api.yaml {{.devE2EContainer}}:/opt/cube-cos-api.yaml"
      - ssh {{.devCosUser}}@{{.devE2EIp}} "docker exec -i {{.devE2EContainer}} ssh root@{{.devE2ENode}} rm /etc/cube/api/cube-cos-api.yaml"
      - ssh {{.devCosUser}}@{{.devE2EIp}} "docker exec -i {{.devE2EContainer}} scp /opt/cube-cos-api.yaml root@{{.devE2ENode}}:/etc/cube/api/cube-cos-api.yaml"
  activateSystemdService:
    cmds:
      - ssh {{.devCosUser}}@{{.devCosIp}} "systemctl daemon-reload"
      - ssh {{.devCosUser}}@{{.devCosIp}} "systemctl disable cube-cos-api.service"
      - ssh {{.devCosUser}}@{{.devCosIp}} "systemctl restart cube-cos-api.service"
  restartRemoteE2ESystemdService:
    cmds:
      - ssh {{.devCosUser}}@{{.devE2EIp}} "docker exec -i {{.devE2EContainer}} ssh root@{{.devE2ENode}} systemctl restart cube-cos-api.service"
  buildJailImage:
    cmds:
      - cmd: sudo docker build --platform=linux/amd64 -t localhost:5000/cube-cos-api-jail -f build/cube-cos-api-jail.Dockerfile .
  runJailContainer:
    cmds:
      - cmd: docker run -it --rm --name cube-cos-api-jail {{.jenkinsBuildServerBinaryImage}}
  deployJailImageToRemoteJenkins:
    cmds:
      - task: buildJailImage
      - docker save {{.jenkinsBuildServerBinaryImage}} > cube-cos-api-jail.tar
      - scp ./cube-cos-api-jail.tar {{.jenkinsBuildServerUser}}@{{.jenkinsBuildServerIp}}:~/
      - ssh {{.jenkinsBuildServerUser}}@{{.jenkinsBuildServerIp}} "docker load -i ./cube-cos-api-jail.tar"
  buildRpmImage:
    cmds:
      - sudo docker build --platform=linux/amd64 -t localhost:5000/cube-cos-api-rpm -f build/cube-cos-api-rpm.Dockerfile .
  runRpmContainer:
    cmds:
      - docker run -it --rm --name cube-cos-api-rpm {{.jenkinsBuildServerRpmImage}}
  deployRpmImageToRemoteJenkins:
    cmds:
      - task: buildRpmImage
      - docker save {{.jenkinsBuildServerRpmImage}} > cube-cos-api-rpm.tar
      - scp ./cube-cos-api-rpm.tar {{.jenkinsBuildServerUser}}@{{.jenkinsBuildServerIp}}:~/
      - ssh {{.jenkinsBuildServerUser}}@{{.jenkinsBuildServerIp}} "docker load -i ./cube-cos-api-rpm.tar"
  
