version: '3'

vars:
  apiService: "cube-cos-api"
  dbService: "cube-cos-mongo"
  devCosUser: "root"
  devCosIp: "10.32.10.113"
  mongoVersion: "6.0.19"

tasks:
  vet:
    cmds:
      - GOWORK=off go vet ./...
  test:
    cmds:
      - GOWORK=off go test -v ./...
  buildLocalBinary:
    cmds:
      - GOWORK=off GOOS=linux GOARCH=amd64 go build -o bin/{{.apiService}} cmd/main.go
  updateApiDocs:
    cmds:
      - swag init --output ./api -g ./cmd/main.go
  runLocalDevApi:
    cmds:
      - GOWORK=off go run cmd/main.go -conf configs/{{.apiService}}.yaml
  runLocalDevMongo:
    cmds:
      - docker run -d -p 27017:27017 --name {{.dbService}}-0 --hostname {{.dbService}}-0 mongo:{{.mongoVersion}} mongod --replSet cube-cos-rs
  deployAllRemoteDevServices:
    cmds:
      - task: deployRemoteDevApi
      - task: deployRemoteDevMongo
  deployRemoteDevApi:
    cmds:
      - task: buildLocalBinary
      - task: stopRemoteDevApi
      - task: initRemoteCosDevEnv
      - task: moveLocalBinaryToRemoteCos
      - task: moveLocalConfigToRemoteCos
  deployRemoteDevMongo:
    cmds:
      - task: initRemoteCosDevEnv
      - task: simulateRemoteProductionMongo
  stopRemoteDevApi:
    cmds:
      - ssh {{.devCosUser}}@{{.devCosIp}} "pkill -f {{.apiService}}"
    ignore_error: true
  simulateRemoteProductionMongo:
    cmds:
      - ssh {{.devCosUser}}@{{.devCosIp}} "docker run -itd -p 27017:27017 -v /opt/dev/{{.apiService}}/mongo:/data/db --name {{.dbService}}-0 --network={{.dbService}} --hostname {{.dbService}}-0 mongo:{{.mongoVersion}} mongod --replSet {{.dbService}}"
      - ssh {{.devCosUser}}@{{.devCosIp}} "sleep 15"
      - ssh {{.devCosUser}}@{{.devCosIp}} 'docker exec -i {{.dbService}}-0 mongosh --quiet --eval "rs.initiate()"'
      - ssh {{.devCosUser}}@{{.devCosIp}} 'docker exec -i {{.dbService}}-0 mongosh --quiet --eval "db.getSiblingDB(\"admin\").createUser({user:\"admin\",pwd:\"admin\",roles:[{role:\"userAdminAnyDatabase\",db:\"admin\"}]})"'
  removeRemoteDevMongo:
    cmds:
      - ssh {{.devCosUser}}@{{.devCosIp}} "docker rm -f {{.dbService}}-0"
      - ssh {{.devCosUser}}@{{.devCosIp}} "rm -rf /opt/dev/{{.apiService}}/mongo"
      - ssh {{.devCosUser}}@{{.devCosIp}} "docker network rm {{.dbService}}"
  initRemoteCosDevEnv:
    cmds:
      - task: initRemoteCosWorkspace
      - task: initRemoteCosContainerNetwork
  initRemoteCosWorkspace:
    cmds:
      - ssh {{.devCosUser}}@{{.devCosIp}} "mkdir -p /opt/dev/{{.apiService}}"
  initRemoteCosContainerNetwork:
    cmds:
      - ssh {{.devCosUser}}@{{.devCosIp}} "docker network ls | grep {{.dbService}} || docker network create {{.dbService}}"
    ignore_error: true
  moveLocalBinaryToRemoteCos:
    cmds:
      - scp bin/{{.apiService}} {{.devCosUser}}@{{.devCosIp}}:/opt/dev/{{.apiService}}
  moveLocalConfigToRemoteCos:
    cmds:
      - scp configs/{{.apiService}}.yaml {{.devCosUser}}@{{.devCosIp}}:/opt/dev/{{.apiService}}
